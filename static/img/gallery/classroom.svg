  <g>
    <rect x="90" y="330" width="140" height="18" fill="#8B5A2B"/>
    <rect x="100" y="348" width="16" height="60" fill="#5C3A1E"/>
    <rect x="200" y="348" width="16" height="60" fill="#5C3A1E"/>
    <circle cx="160" cy="300" r="26" fill="#E8B27A"/>
    <rect x="134" y="326" width="52" height="50" fill="#E8A33D"/>
  </g>
  <g>
    <rect x="320" y="330" width="140" height="18" fill="#8B5A2B"/>
    <rect x="330" y="348" width="16" height="60" fill="#5C3A1E"/>
    <rect x="430" y="348" width="16" height="60" fill="#5C3A1E"/>
