    <rect x="364" y="326" width="52" height="50" fill="#2F6F4E"/>
  </g>
  <g>
    <rect x="550" y="330" width="140" height="18" fill="#8B5A2B"/>
    <rect x="560" y="348" width="16" height="60" fill="#5C3A1E"/>
    <rect x="660" y="348" width="16" height="60" fill="#5C3A1E"/>
    <circle cx="620" cy="300" r="26" fill="#E8B27A"/>
    <rect x="594" y="326" width="52" height="50" fill="#7A2632"/>
  </g>
  <!-- window -->
  <rect x="600" y="50" width="150" height="150" fill="#7EC8E3" stroke="#14213D" stroke-width="8"/>
  <path d="M675 50 V200 M600 125 H750" stroke="#14213D" stroke-width="6"/>
